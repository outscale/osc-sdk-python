        '500':
          description: InternalError
          content:
            application/json:
              example:
                Errors:
                - Type: InternalError
                  Details: Failed to update project
                  Code: '500'
                ResponseContext:
                  RequestId: 45a64090-2e5b-428f-bfea-83a5f783f9e6
