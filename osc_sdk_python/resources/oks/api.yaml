openapi: 3.0.3
info:
  title: OKS API
  description: API for creating your clusters on Kubernetes. Each cluster is 
    linked to a project. in a project you can have several clusters
  version: '1.0'
paths:
  /projects:
    post:
      tags:
      - Projects
      summary: Create Project
      description: Creates a new project with the provided details. The request 
        must include the project data in the request body. Returns the details 
        of the created project.
      operationId: CreateProject
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectInput'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '503':
          description: ResourceIsNotReady
          content:
            application/json:
              example:
                Errors:
                - Type: ResourceIsNotReady
                  Details: The service has been under global maintenance for 15 
                    mins. Please, try again later
                  Code: '503'
                ResponseContext:
                  RequestId: 45a64090-2e5b-428f-bfea-83a5f783f9e6
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '423':
          description: LockedResource
          content:
            application/json:
              example:
                Errors:
                - Type: LockedResource
                  Details: The project has been under maintenance for 15 mins. 
                    Please, try again later
                  Code: '423'
                ResponseContext:
                  RequestId: 45a64090-2e5b-428f-bfea-83a5f783f9e6
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: ResourceConflict
          content:
            application/json:
              example:
                Errors:
                - Type: ResourceConflict
                  Details: Project with this name already exists.
                  Code: '409'
                ResponseContext:
                  RequestId: 45a64090-2e5b-428f-bfea-83a5f783f9e6
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: InternalError
          content:
            application/json:
              example:
                Errors:
                - Type: InternalError
                  Details: Failed to create project
                  Code: '500'
                ResponseContext:
                  RequestId: 45a64090-2e5b-428f-bfea-83a5f783f9e6
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: ForbiddenError
          content:
            application/json:
              example:
                Errors:
                - Type: ForbiddenError
                  Details: You cannot have more than 2 projects.
                  Code: '403'
                ResponseContext:
                  RequestId: 45a64090-2e5b-428f-bfea-83a5f783f9e6
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: ValidationError
          content:
            application/json:
              example:
                Errors:
                - Type: ValidationError
                  Details: "Invalid CIDR: '10.50.15.24/32' must have a prefix length
                    between /16 and /23."
                  Code: '422'
                - Type: ValidationError
                  Details:
                  - loc:
                    - string
                    - 0
                    msg: string
                    type: string
                  Code: '422'
                ResponseContext:
                  RequestId: 45a64090-2e5b-428f-bfea-83a5f783f9e6
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
      - Projects
      summary: Get Projects
      description: Retrieves a list of all projects with optional filters for 
        name, status, CIDR, and deletion status. Returns a list of matching 
        projects based on the specified filters.
      operationId: ListProjects
      parameters:
      - name: name
        in: query
        required: false
        schema:
          type: string
          nullable: true
      - name: status
        in: query
        required: false
        schema:
          type: string
          nullable: true
      - name: cidr
        in: query
        required: false
        schema:
          type: string
          nullable: true
      - name: deleted
        in: query
        required: false
        schema:
          type: boolean
          nullable: true
      - name: cursor
        in: query
        required: false
        schema:
          type: string
          nullable: true
      - name: page
        in: query
        required: false
        schema:
          type: integer
          nullable: true
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          exclusiveMinimum: false
          nullable: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponseList'
        '500':
          description: InternalError
          content:
            application/json:
              example:
                Errors:
                - Type: InternalError
                  Details: Internal server error
                  Code: '500'
                ResponseContext:
                  RequestId: 45a64090-2e5b-428f-bfea-83a5f783f9e6
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: ValidationError
          content:
            application/json:
              example:
                Errors:
                - Type: ValidationError
                  Details:
                  - loc:
                    - string
                    - 0
                    msg: string
                    type: string
                  Code: '422'
                ResponseContext:
                  RequestId: 45a64090-2e5b-428f-bfea-83a5f783f9e6
              schema:
                $ref: '#/components/schemas/ErrorResponse'
