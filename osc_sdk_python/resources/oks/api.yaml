    delete:
      tags:
      - Projects
      summary: Delete Project
      description: Deletes a specific project by its ID. Returns a confirmation 
        of the project deletion.
      operationId: DeleteProject
      parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          title: Project Id
      responses:
        '200':
          description: Successful Response
          content:
