                - Type: ResourceConflict
                  Details: The requested action cannot be performed because the 
                    project has been deleted.
                  Code: '409'
                - Type: ResourceConflict
                  Details: The requested action cannot be performed because the 
                    cluster has been deleted.
                  Code: '409'
